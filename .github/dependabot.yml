version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    open-pull-requests-limit: 5
    schedule:
      interval: monthly
    cooldown:
      default-days: 7

  - package-ecosystem: npm
    directory: /client
    open-pull-requests-limit: 5
    schedule:
      interval: weekly
    cooldown:
      default-days: 7

  - package-ecosystem: npm
    directory: /server
    open-pull-requests-limit: 5
    schedule:
      interval: weekly
    cooldown:
      default-days: 7

  - package-ecosystem: npm
    directory: /indexer
    open-pull-requests-limit: 5
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
