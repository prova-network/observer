# Temporary override for parallel reindexing.
# Run alongside main compose: docker compose -f docker-compose.yml -f docker-compose.reindex.yml up -d
# Once caught up, swap volumes in docker-compose.yml and remove this file.

services:
  # Full-node proxy for reindexing (needs full history, not gateway-limited)
  lotus-proxy-fullnode:
    image: alpine/socat:latest
    network_mode: host
    entrypoint: ["/bin/sh", "-c", "socat TCP-LISTEN:11244,fork,reuseaddr TCP:127.0.0.1:1234 & socat TCP-LISTEN:11245,fork,reuseaddr TCP:127.0.0.1:1235"]
    restart: unless-stopped

  postgres-calibnet-v2:
    image: postgres:18
    environment:
      POSTGRES_DB: ponder
      POSTGRES_USER: ponder
      POSTGRES_PASSWORD: ponder
    volumes:
      - pgdata-calibnet-v2:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ponder"]
      interval: 2s
      timeout: 5s
      retries: 10

  postgres-mainnet-v2:
    image: postgres:18
    environment:
      POSTGRES_DB: ponder
      POSTGRES_USER: ponder
      POSTGRES_PASSWORD: ponder
    volumes:
      - pgdata-mainnet-v2:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ponder"]
      interval: 2s
      timeout: 5s
      retries: 10

  ponder-calibnet-v2:
    build: indexer
    depends_on:
      postgres-calibnet-v2:
        condition: service_healthy
      lotus-proxy-fullnode:
        condition: service_started
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DATABASE_URL: postgres://ponder:ponder@postgres-calibnet-v2:5432/ponder
      DATABASE_SCHEMA: public
      RPC_URL: http://host.docker.internal:11245/rpc/v1
      PORT: 17837
    volumes:
      - ./indexer/ponder.config.calibnet.ts:/app/ponder.config.ts
      - ./indexer/ponder.schema.ts:/app/ponder.schema.ts
      - ./indexer/src:/app/src
      - ./indexer/abis:/app/abis

  ponder-mainnet-v2:
    build: indexer
    depends_on:
      postgres-mainnet-v2:
        condition: service_healthy
      lotus-proxy-fullnode:
        condition: service_started
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DATABASE_URL: postgres://ponder:ponder@postgres-mainnet-v2:5432/ponder
      DATABASE_SCHEMA: public
      RPC_URL: http://host.docker.internal:11244/rpc/v1
      PORT: 17838
    volumes:
      - ./indexer/ponder.config.mainnet.ts:/app/ponder.config.ts
      - ./indexer/ponder.schema.ts:/app/ponder.schema.ts
      - ./indexer/src:/app/src
      - ./indexer/abis:/app/abis

volumes:
  pgdata-calibnet-v2:
    name: ponder_pgdata-calibnet-v2
    external: true
  pgdata-mainnet-v2:
    name: ponder_pgdata-mainnet-v2
    external: true
